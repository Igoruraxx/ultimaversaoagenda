<!doctype html>
<html lang="pt-BR" class="dark">

  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-first viewport: prevent user scaling to enforce app-like feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>FITPRO - Agenda Personal</title>
    <meta name="description" content="FITPRO - Agenda e Gestão para Personal Trainers" />

    <!-- ── PWA Manifest ─────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa/icon-512x512.png" />

    <!-- ── Android / Chrome ─────────────────────────────────────── -->
    <meta name="theme-color" content="#FF4500" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS / Safari ─────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FITPRO" />

    <!-- Apple Touch Icons (all sizes) -->
    <link rel="apple-touch-icon" sizes="72x72"  href="/pwa/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="96x96"  href="/pwa/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/pwa/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/pwa/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa/icon-512x512.png" />

    <!-- Apple Splash Screens -->
    <!-- iPhone SE (640x1136) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/pwa/splash-640x1136.png" />
    <!-- iPhone 8 (750x1334) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/pwa/splash-750x1334.png" />
    <!-- iPhone XR (828x1792) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/pwa/splash-828x1792.png" />
    <!-- iPhone X/XS (1125x2436) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/pwa/splash-1125x2436.png" />
    <!-- iPhone 12 (1170x2532) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/pwa/splash-1170x2532.png" />
    <!-- iPhone 14 Pro (1179x2556) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/pwa/splash-1179x2556.png" />
    <!-- iPhone XS Max (1242x2688) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/pwa/splash-1242x2688.png" />
    <!-- iPhone 12 Pro Max (1284x2778) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/pwa/splash-1284x2778.png" />
    <!-- iPad Pro 12.9" (2048x2732) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/pwa/splash-2048x2732.png" />

    <!-- ── Open Graph ─────────────────────────────────────────────── -->
    <meta property="og:title" content="FITPRO - Agenda Personal" />
    <meta property="og:description" content="Agenda e Gestão para Personal Trainers" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa/icon-512x512.png" />

    <!-- ── Fonts ─────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <script>
      // Force dark theme immediately to prevent flash of light theme
      document.documentElement.classList.add('dark');
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
